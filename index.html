<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Map Builder</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="app-container">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Identity Taxonomie</h2>
                <input type="text" id="search-bar" placeholder="Suche nach Labels...">
            </div>
            
            <div id="taxonomy-tree" class="taxonomy-list">
                </div>

            <div id="intensity-panel" class="hidden">
                <h3 id="selected-label">Label Name</h3>
                <p id="selected-desc">Beschreibung des Labels.</p>
                
                <div class="slider-group">
                    <label for="intensity-slider">Identifikation / Assoziation:</label>
                    <input type="range" id="intensity-slider" min="10" max="100" value="70">
                    <div class="slider-labels">
                        <span>Schwach</span>
                        <span>Stark</span>
                    </div>
                </div>
                
                <button id="add-to-canvas-btn">Zum Baum hinzufügen</button>
                <button id="cancel-btn" class="secondary">Abbrechen</button>
            </div>
        </aside>

        <main id="canvas-area">
            <button id="export-btn">Als PNG Exportieren</button>
            <svg id="identity-canvas"></svg>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
