<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Identity Taxonomy</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <div id="app">
        <aside id="sidebar">
            <h2>Labels auswählen</h2>
            <input type="text" id="search" placeholder="Suche Labels...">
            <div id="folder-container"></div>
            
            <div id="controls">
                <label for="intensity">Stärke der Assoziation:</label>
                <input type="range" id="intensity" min="20" max="90" value="50">
                <button id="export-btn">Als Bild exportieren</button>
            </div>
        </aside>

        <main id="tree-container">
            <div id="tree-canvas"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
